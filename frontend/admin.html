<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Robotics Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="js/api.js"></script>
  <script src="js/sidebar.js"></script>
  <script>buildSidebar("admin");</script>

  <div class="app-wrapper">
    <div style="width:230px;flex-shrink:0"></div>
    <div class="main-content">

      <header class="page-header">
        <div>
          <div class="page-title">Admin Panel</div>
          <div class="page-subtitle">System management & configuration</div>
        </div>
      </header>

      <div class="page-body">
        
        <!-- Users Management -->
        <div class="card">
          <div class="section-title">Users</div>
          <div style="display:flex;gap:12px;margin-bottom:20px">
            <button class="btn btn-primary btn-sm" onclick="openModal('user-modal')">+ Add User</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Full Name</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Teams Management -->
        <div class="card" style="margin-top:24px">
          <div class="section-title">External Teams</div>
          <div style="display:flex;gap:12px;margin-bottom:20px">
            <button class="btn btn-primary btn-sm" onclick="openModal('team-modal')">+ Add Team</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Team Name</th>
                <th>Contact Person</th>
                <th>Email</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="teams-tbody">
              <tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Projects Management -->
        <div class="card" style="margin-top:24px">
          <div class="section-title">Projects</div>
          <div style="display:flex;gap:12px;margin-bottom:20px">
            <button class="btn btn-primary btn-sm" onclick="openModal('project-modal')">+ Add Project</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Project Name</th>
                <th>Lead</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="projects-tbody">
              <tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Loading...</td></tr>
            </tbody>
          </table>
        </div>

      </div><!-- /page-body -->
    </div><!-- /main-content -->
  </div><!-- /app-wrapper -->

  <!-- User Modal -->
  <div class="modal-overlay" id="user-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add User</span>
        <button class="modal-close" onclick="closeModal('user-modal')">×</button>
      </div>
      <div class="form-group">
        <label>Username *</label>
        <input class="form-control" id="user-username" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input class="form-control" id="user-fullname" placeholder="Enter full name">
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input class="form-control" type="password" id="user-password" placeholder="Enter password">
      </div>
      <div class="form-group">
        <label>Role *</label>
        <select class="form-control" id="user-role">
          <option value="guest">Guest</option>
          <option value="student">Student</option>
          <option value="lab_incharge">Lab In-Charge</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('user-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveUser()">Save User</button>
      </div>
    </div>
  </div>

  <!-- Team Modal -->
  <div class="modal-overlay" id="team-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add Team</span>
        <button class="modal-close" onclick="closeModal('team-modal')">×</button>
      </div>
      <div class="form-group">
        <label>Team Name *</label>
        <input class="form-control" id="team-name" placeholder="Enter team name">
      </div>
      <div class="form-group">
        <label>Contact Person</label>
        <input class="form-control" id="team-contact" placeholder="Enter contact name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="form-control" type="email" id="team-email" placeholder="Enter email">
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('team-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveTeam()">Save Team</button>
      </div>
    </div>
  </div>

  <!-- Project Modal -->
  <div class="modal-overlay" id="project-modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Add Project</span>
        <button class="modal-close" onclick="closeModal('project-modal')">×</button>
      </div>
      <div class="form-group">
        <label>Project Name *</label>
        <input class="form-control" id="project-name" placeholder="Enter project name">
      </div>
      <div class="form-group">
        <label>Lead</label>
        <input class="form-control" id="project-lead" placeholder="Enter project lead">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select class="form-control" id="project-status">
          <option value="Active">Active</option>
          <option value="Completed">Completed</option>
          <option value="On Hold">On Hold</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('project-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveProject()">Save Project</button>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    (async () => {
      currentUser = await requireAuth();
      if (!currentUser || !["admin", "lab_incharge"].includes(currentUser.role)) {
        toast("Access denied. Admin only.", "error");
        setTimeout(() => window.location.href = "dashboard.html", 2000);
        return;
      }
      await loadUsers();
    })();

    async function loadUsers() {
      try {
        const users = await api.get("/admin/users");
        const tbody = document.getElementById("users-tbody");
        if (!users || users.length === 0) {
          tbody.innerHTML = noDataRow(5);
          return;
        }
        tbody.innerHTML = users.map(user => `
          <tr>
            <td>${user.user_id || user.id || '—'}</td>
            <td>${user.username}</td>
            <td>${user.full_name || '—'}</td>
            <td>${roleBadge(user.role)}</td>
            <td>
              <button class="btn btn-ghost btn-sm" onclick="editUser(${user.user_id || user.id})">Edit</button>
              <button class="btn btn-ghost btn-sm" onclick="deleteUser(${user.user_id || user.id})" style="color:var(--red)">Delete</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        toast(err.message, "error");
      }
    }

    async function saveUser() {
      const username = document.getElementById("user-username").value.trim();
      const fullname = document.getElementById("user-fullname").value.trim();
      const password = document.getElementById("user-password").value;
      const role = document.getElementById("user-role").value;

      if (!username || !password) {
        toast("Username and password are required", "error");
        return;
      }

      try {
        await api.post("/admin/users", {
          username,
          full_name: fullname,
          password,
          role
        });
        toast("User created successfully", "success");
        closeModal("user-modal");
        await loadUsers();
        document.getElementById("user-username").value = "";
        document.getElementById("user-fullname").value = "";
        document.getElementById("user-password").value = "";
      } catch (err) {
        toast(err.message, "error");
      }
    }

    async function saveTeam() {
      const name = document.getElementById("team-name").value.trim();
      const contact = document.getElementById("team-contact").value.trim();
      const email = document.getElementById("team-email").value.trim();

      if (!name) {
        toast("Team name is required", "error");
        return;
      }

      try {
        await api.post("/admin/teams", { name, contact, email });
        toast("Team created successfully", "success");
        closeModal("team-modal");
        document.getElementById("team-name").value = "";
        document.getElementById("team-contact").value = "";
        document.getElementById("team-email").value = "";
      } catch (err) {
        toast(err.message, "error");
      }
    }

    async function saveProject() {
      const name = document.getElementById("project-name").value.trim();
      const lead = document.getElementById("project-lead").value.trim();
      const status = document.getElementById("project-status").value;

      if (!name) {
        toast("Project name is required", "error");
        return;
      }

      try {
        await api.post("/admin/projects", { name, lead, status });
        toast("Project created successfully", "success");
        closeModal("project-modal");
        document.getElementById("project-name").value = "";
        document.getElementById("project-lead").value = "";
      } catch (err) {
        toast(err.message, "error");
      }
    }

    async function deleteUser(userId) {
      if (!confirm("Are you sure you want to delete this user?")) return;
      try {
        await api.delete(`/admin/users/${userId}`);
        toast("User deleted successfully", "success");
        await loadUsers();
      } catch (err) {
        toast(err.message, "error");
      }
    }
  </script>
</body>
</html>
