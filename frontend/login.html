<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Robotics Lab Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-box">
      <div class="login-logo">
        <div class="logo-big">⚙️</div>
        <h1>Robotics Lab</h1>
        <p>Inventory & Usage Management System</p>
      </div>

      <div class="login-error" id="login-error"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" class="form-control" id="username" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter password" autocomplete="current-password">
      </div>

      <button class="btn-login" id="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>

      <div class="login-footer">
        <p style="margin-bottom:6px">Demo credentials</p>
        <p>admin / admin123 &nbsp;|&nbsp; incharge / incharge123</p>
        <p>student1 / student123 &nbsp;|&nbsp; guest / guest123</p>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    (async () => {
      try {
        const res = await fetch("http://localhost:5000/api/auth/me", { credentials: "include" });
        if (res.ok) window.location.href = "dashboard.html";
      } catch (_) {}
    })();

    // Allow Enter key
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

    async function doLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errEl    = document.getElementById("login-error");
      const btn      = document.getElementById("login-btn");

      errEl.style.display = "none";
      if (!username || !password) {
        errEl.textContent = "Please enter your username and password.";
        errEl.style.display = "block";
        return;
      }

      btn.textContent = "AUTHENTICATING...";
      btn.disabled = true;

      try {
        const res  = await fetch("http://localhost:5000/api/auth/login", {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Login failed");
        window.location.href = "dashboard.html";
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = "block";
        btn.textContent = "ACCESS SYSTEM";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
