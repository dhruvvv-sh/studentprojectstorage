<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Robotics Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="js/api.js"></script>
  <script src="js/sidebar.js"></script>
  <script>buildSidebar("reports");</script>

  <div class="app-wrapper">
    <div style="width:230px;flex-shrink:0"></div>
    <div class="main-content">

      <header class="page-header">
        <div>
          <div class="page-title">Reports</div>
          <div class="page-subtitle">Inventory & usage analytics</div>
        </div>
      </header>

      <div class="page-body">
        
        <!-- Reports Section -->
        <div class="card">
          <div class="section-title">Available Reports</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:20px">
            
            <div class="report-card" onclick="loadReport('overdue')">
              <div class="report-icon">⚠️</div>
              <div class="report-title">Overdue Items</div>
              <div class="report-description">Items not returned on time</div>
            </div>

            <div class="report-card" onclick="loadReport('low-stock')">
              <div class="report-icon">📉</div>
              <div class="report-title">Low Stock Items</div>
              <div class="report-description">Items with availability below 20%</div>
            </div>

            <div class="report-card" onclick="loadReport('usage-summary')">
              <div class="report-icon">📊</div>
              <div class="report-title">Usage Summary</div>
              <div class="report-description">Historical usage patterns</div>
            </div>

            <div class="report-card" onclick="loadReport('user-activity')">
              <div class="report-icon">👥</div>
              <div class="report-title">User Activity</div>
              <div class="report-description">User borrowing statistics</div>
            </div>

          </div>
        </div>

        <!-- Report Results -->
        <div class="card" id="report-results" style="display:none;margin-top:24px">
          <div class="section-title" id="report-title">Report Results</div>
          <div id="report-content"></div>
        </div>

      </div><!-- /page-body -->
    </div><!-- /main-content -->
  </div><!-- /app-wrapper -->

  <style>
    .report-card {
      padding: 20px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .report-card:hover {
      border-color: var(--primary);
      background: var(--bg-hover);
      transform: translateY(-2px);
    }
    .report-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .report-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 6px;
    }
    .report-description {
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>

  <script>
    let currentUser = null;

    (async () => {
      currentUser = await requireAuth();
      if (!currentUser) return;
    })();

    async function loadReport(reportType) {
      const resultsDiv = document.getElementById("report-results");
      const titleEl = document.getElementById("report-title");
      const contentEl = document.getElementById("report-content");

      try {
        let data, title;

        switch(reportType) {
          case 'overdue':
            data = await api.get("/usage/overdue");
            title = "Overdue Items";
            contentEl.innerHTML = renderOverdueReport(data);
            break;
          case 'low-stock':
            data = await api.get("/items");
            title = "Low Stock Items";
            const lowStock = data.filter(item => (item.available_quantity / item.total_quantity) < 0.2);
            contentEl.innerHTML = renderLowStockReport(lowStock);
            break;
          case 'usage-summary':
            data = await api.get("/usage");
            title = "Usage Summary";
            contentEl.innerHTML = renderUsageSummary(data);
            break;
          case 'user-activity':
            data = await api.get("/usage");
            title = "User Activity";
            contentEl.innerHTML = renderUserActivity(data);
            break;
        }

        titleEl.textContent = title;
        resultsDiv.style.display = "block";
        window.scrollTo(0, resultsDiv.offsetTop - 100);

      } catch (err) {
        toast(err.message, "error");
      }
    }

    function renderOverdueReport(data) {
      if (!data || data.length === 0) {
        return noDataRow(6, "No overdue items");
      }
      return `
        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>User</th>
              <th>Issued</th>
              <th>Due Date</th>
              <th>Days Overdue</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(item => `
              <tr>
                <td>${item.item_name || '—'}</td>
                <td>${item.username || '—'}</td>
                <td>${fmtDate(item.issue_date)}</td>
                <td>${fmtDate(item.due_date)}</td>
                <td><span style="color:var(--red)">⚠️ ${Math.floor((Date.now() - new Date(item.due_date)) / 86400000)} days</span></td>
                <td>${statusBadge('In Use')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderLowStockReport(data) {
      if (!data || data.length === 0) {
        return `<div class="empty-state"><div class="empty-icon">✅</div><div>All items have sufficient stock</div></div>`;
      }
      return `
        <table>
          <thead>
            <tr>
              <th>Item Name</th>
              <th>Category</th>
              <th>Available</th>
              <th>Total</th>
              <th>Usage %</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(item => {
              const usagePercent = Math.round(((item.total_quantity - item.available_quantity) / item.total_quantity) * 100);
              return `
                <tr>
                  <td>${item.item_name}</td>
                  <td>${item.category_name}</td>
                  <td><span style="color:var(--red);font-weight:600">${item.available_quantity}</span></td>
                  <td>${item.total_quantity}</td>
                  <td>${usagePercent}%</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function renderUsageSummary(data) {
      if (!data || data.length === 0) {
        return `<div class="empty-state"><div class="empty-icon">📭</div><div>No usage data available</div></div>`;
      }
      const categoryUsage = {};
      data.forEach(item => {
        const cat = item.category_name || 'Uncategorized';
        categoryUsage[cat] = (categoryUsage[cat] || 0) + 1;
      });
      return `
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>Items Used</th>
              <th>Percentage</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(categoryUsage).map(([cat, count]) => {
              const pct = Math.round((count / data.length) * 100);
              return `
                <tr>
                  <td>${cat}</td>
                  <td>${count}</td>
                  <td><div class="qty-bar"><div class="qty-fill" style="width:${pct}%"></div></div>${pct}%</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }

    function renderUserActivity(data) {
      if (!data || data.length === 0) {
        return `<div class="empty-state"><div class="empty-icon">📭</div><div>No user activity</div></div>`;
      }
      const userActivity = {};
      data.forEach(item => {
        const user = item.username || 'Unknown';
        userActivity[user] = (userActivity[user] || 0) + 1;
      });
      return `
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Items Borrowed</th>
              <th>Activity Level</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(userActivity).map(([user, count]) => {
              let level = "Low";
              if (count >= 10) level = "High";
              else if (count >= 5) level = "Medium";
              const badgeClass = level === 'High' ? 'badge-amber' : level === 'Medium' ? 'badge-inuse' : 'badge-available';
              return `
                <tr>
                  <td>${user}</td>
                  <td>${count}</td>
                  <td><span class="badge ${badgeClass}">${level}</span></td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      `;
    }
  </script>
</body>
</html>
